name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Create release archive
        run: |
          mkdir release
          copy build\Release\ida-patcher.dll release\

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Release/ida-patcher.dll
            examples/template/ida-patcher.json
          generate_release_notes: true
          draft: false
          prerelease: false
