name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build Library
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake (no tests)
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=OFF ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ida-patcher
          path: build/Release/ida-patcher.dll

  test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake (with tests)
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=ON ..

      - name: Build and test
        run: |
          cd build
          cmake --build . --config Release
          ctest --output-on-failure --build-config Release
