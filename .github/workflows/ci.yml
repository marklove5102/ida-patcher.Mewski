name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ida-patcher.so
            artifact_path: build/ida-patcher.so
            arch: x64
          - os: windows-latest
            artifact_name: ida-patcher.dll
            artifact_path: build/Release/ida-patcher.dll
            arch: x64
          - os: macos-13
            artifact_name: ida-patcher.dylib
            artifact_path: build/ida-patcher.dylib
            arch: x64
            cmake_arch: x86_64
          - os: macos-latest
            artifact_name: ida-patcher.dylib
            artifact_path: build/ida-patcher.dylib
            arch: arm64
            cmake_arch: arm64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }}

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ida-patcher-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_path }}
